<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Bootstrap</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    .box {
      background-color: #fea7bb;
      color: white;
      border: 2px solid white;
      padding: 30px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    h2{
        margin-top: 3%;
        margin-bottom: 3%;
    }

    
  </style>
</head>
<body>

  <!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Bootstrap</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <a class="nav-link active" aria-current="page" href="#">Home</a>
        <a class="nav-link" href="#">About</a>
        <a class="nav-link" href="#">Contact</a>
      </div>
    </div>
  </div>
</nav>

<!--Container-->
<div class="container">
    <div class="p-5 bg-light rounded text-center shadow-sm mt-5">
  <h1>Bootstrap Grid Layout</h1>
  </div>
</div>

<!--grid-->
<div class="container text-center">
    <H2>Equal-width</H2>
  <div class="row">
    <div class="col-md-4">
      <div class="box">Column</div>
    </div>
    <div class="col-md-4">
      <div class="box">Column</div>
    </div>
    <div class="col-md-4">
      <div class="box">Column</div>
    </div>
  </div>
</div>

<!--Setting one column width-->
<div class="container text-center">
    <H2>Setting one column width</H2>
  <div class="row">
    <div class="col">
      <div class="box">1 of 3</div>
    </div>
    <div class="col-6">
      <div class="box">2 of 3 (wider)</div>
    </div>
    <div class="col">
      <div class="box">3 of 3</div>
    </div>
  </div>
  <div class="row">
    <div class="col">
      <div class="box">1 of 3</div>
    </div>
    <div class="col-5">
      <div class="box">2 of 3 (wider)</div>
    </div>
    <div class="col">
      <div class="box">3 of 3</div>
    </div>
  </div>
</div>

<!--Responsive-->
  <div class="container mb-5">
    <H2>Responsive grid</H2>

    <div class="row">
      <div class="col-sm-6 col-lg-3">
        <div class="box">Box 1</div>
      </div>

      <div class="col-sm-6 col-lg-3">
        <div class="box">Box 2</div>
      </div>

      <div class="col-sm-6 col-lg-3">
        <div class="box">Box 3</div>
      </div>

      <div class="col-sm-6 col-lg-3">
        <div class="box">Box 4</div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
